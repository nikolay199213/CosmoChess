version: '3.8'

# Для локальной разработки - только инфраструктура
services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: cosmochess-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    networks:
      - cosmochess-network

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: cosmochess-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    networks:
      - cosmochess-network

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: cosmochess-kafka-ui
    depends_on:
      - kafka
    ports:
      - "8081:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
    networks:
      - cosmochess-network

  postgres:
    image: postgres:15
    container_name: cosmochess-postgres
    environment:
      POSTGRES_DB: cosmochess
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - cosmochess-network

  engine-service:
    build:
      context: ./backend/CosmoChess.EngineService
      dockerfile: Dockerfile
    container_name: cosmochess-engine
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - STOCKFISH_PATH=/usr/games/stockfish
    ports:
      - "5001:5001"
    networks:
      - cosmochess-network

  bot-service:
    build:
      context: ./backend/CosmoChess.BotService
      dockerfile: Dockerfile
    container_name: cosmochess-bot
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - KAFKA_GROUP_ID=bot-workers
      - KAFKA_REQUEST_TOPIC=bot-move-requests
      - KAFKA_RESULT_TOPIC=bot-move-results
      - ENGINE_SERVICE_URL=http://engine-service:5001
    depends_on:
      - kafka
      - engine-service
    networks:
      - cosmochess-network

volumes:
  postgres_data:

networks:
  cosmochess-network:
