version: '3.8'

services:
  # Zookeeper for Kafka
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: cosmochess-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - cosmochess-network
    restart: unless-stopped

  # Apache Kafka
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: cosmochess-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    networks:
      - cosmochess-network
    restart: unless-stopped

  # Kafka UI for monitoring
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: cosmochess-kafka-ui
    depends_on:
      - kafka
    ports:
      - "8081:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
    networks:
      - cosmochess-network
    restart: unless-stopped

  # PostgreSQL Database
  postgres:
    image: postgres:15
    container_name: cosmochess-postgres
    environment:
      POSTGRES_DB: cosmochess
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init:/docker-entrypoint-initdb.d
    networks:
      - cosmochess-network
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: cosmochess-redis
    ports:
      - "6379:6379"
    networks:
      - cosmochess-network
    restart: unless-stopped
    

  # Engine Service (Stockfish wrapper)
  engine-service:
    build:
      context: ./backend/CosmoChess.EngineService
      dockerfile: Dockerfile
    container_name: cosmochess-engine
    depends_on:
     - redis
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - STOCKFISH_PATH=/usr/games/stockfish
      - STOCKFISH_HASH_SIZE=1024
      - STOCKFISH_THREADS=4
      - STOCKFISH_TIMEOUT_SECONDS=60
      - REDIS_CONNECTION_STRING=redis:6379
    ports:
      - "5001:5001"
    networks:
      - cosmochess-network
    restart: unless-stopped

  # Bot Service (Kafka-based bot move processor)
  bot-service:
    build:
      context: ./backend/CosmoChess.BotService
      dockerfile: Dockerfile
    container_name: cosmochess-bot
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - KAFKA_GROUP_ID=bot-workers
      - KAFKA_REQUEST_TOPIC=bot-move-requests
      - KAFKA_RESULT_TOPIC=bot-move-results
      - ENGINE_SERVICE_URL=http://engine-service:5001
    depends_on:
      - kafka
      - engine-service
    networks:
      - cosmochess-network
    restart: unless-stopped

  # Backend API (Game Service)
  backend:
    build:
      context: ./backend
      dockerfile: CosmoChess.Api/Dockerfile
    container_name: cosmochess-backend
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - DB_CONNECTION_STRING=Host=postgres;Database=cosmochess;Username=postgres;Password=password123
      - ENGINE_SERVICE_URL=http://engine-service:5001
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - KAFKA_GROUP_ID=game-service
      - KAFKA_REQUEST_TOPIC=bot-move-requests
      - KAFKA_RESULT_TOPIC=bot-move-results
    expose:
      - "5000"
    depends_on:
      - postgres
      - engine-service
      - kafka
    networks:
      - cosmochess-network
    restart: unless-stopped

  # Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: cosmochess-frontend
    expose:
      - "8080"
    depends_on:
      - backend
    networks:
      - cosmochess-network
    restart: unless-stopped

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: cosmochess-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/certbot/conf:/etc/letsencrypt
      - ./nginx/certbot/www:/var/www/certbot
    depends_on:
      - frontend
      - backend
    networks:
      - cosmochess-network
    restart: unless-stopped
    command: "/bin/sh -c 'while :; do sleep 6h & wait $${!}; nginx -s reload; done & nginx -g \"daemon off;\"'"

  # Certbot for SSL certificates
  certbot:
    image: certbot/certbot
    container_name: cosmochess-certbot
    volumes:
      - ./nginx/certbot/conf:/etc/letsencrypt
      - ./nginx/certbot/www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  cosmochess-network: